version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: production_api_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: production_api
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_net

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: production_api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      API_VERSION: v1
      MONGO_URI: mongodb://mongo:27017/production_api
      # ⚠️  Override this secret in production using Docker secrets or a secrets manager
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_use_a_long_random_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend_net

# ── Persistent volume ─────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ── Isolated network ──────────────────────────────────────────────────────────
networks:
  backend_net:
    driver: bridge
